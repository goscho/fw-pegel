<VirtualHost *:80>
    ServerAdmin webmaster@localhost
    DocumentRoot /workspaces/php-api-slim/public

    <Directory /workspaces/php-api-slim/public>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
